// ── Propagate color keys down tree ──────────────────────────────────────────
function propagate(n, key) {
  n._ck = n._ck || key || 'root';
  (n.children || []).forEach(c => propagate(c, n._ck));
}
propagate(DATA, 'root');

function col(d) { return HEX[d.data._ck] || '#a78bfa'; }

// ── Walk helper ─────────────────────────────────────────────────────────────
function walk(n, fn) { fn(n); (n.children||[]).forEach(c => walk(c, fn)); }

// ── SVG + Zoom setup ────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;

const svg = d3.select('body').append('svg').attr('width', W).attr('height', H);
const g   = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.04, 6])
  .on('zoom', e => g.attr('transform', e.transform));

svg.call(zoom).on('dblclick.zoom', null);

// ── CRITICAL FIX: set initial transform BEFORE first render ─────────────────
const initT = d3.zoomIdentity.translate(W/2, H/2).scale(0.65);
svg.call(zoom.transform, initT);   // fires zoom event → sets g transform NOW

// ── Tree layout ─────────────────────────────────────────────────────────────
const treeLayout = d3.tree()
  .size([2 * Math.PI, 400])
  .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);

const rad  = (x, y) => [(y = +y) * Math.cos(x -= Math.PI / 2), y * Math.sin(x)];
const link = d3.linkRadial().angle(d => d.x).radius(d => d.y);

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  g.selectAll('*').remove();
  const root = d3.hierarchy(DATA, d => d._collapsed ? null : d.children);
  treeLayout(root);
  root.each(d => { d._c = col(d); });

  // Links
  g.selectAll('.link').data(root.links()).join('path')
    .attr('class','link')
    .attr('d', link)
    .attr('stroke', d => d.target._c)
    .attr('stroke-width', d => Math.max(0.6, 2 - d.target.depth * 0.28))
    .attr('stroke-opacity', 0.25);

  // Nodes
  const node = g.selectAll('.node').data(root.descendants()).join('g')
    .attr('class','node')
    .attr('transform', d => `translate(${rad(d.x, d.y)})`);

  const r = d => d.depth===0 ? 32 : d.depth===1 ? 18 : d.depth===2 ? 11 : 6;

  node.append('circle').attr('r', d => r(d)+8)
    .attr('fill', d => d._c).attr('fill-opacity',0.05).attr('stroke','none');

  node.append('circle').attr('r', r)
    .attr('fill', d => d._c)
    .attr('fill-opacity', d => d.depth===0?0.88:d.depth===1?0.17:0.09)
    .attr('stroke', d => d._c)
    .attr('stroke-width', d => d.depth===0?0:1.5)
    .attr('stroke-opacity',0.55)
    .on('click',  (e,d) => { e.stopPropagation(); toggle(d.data); })
    .on('dblclick',(e,d) => { e.stopPropagation(); openEd(e,d.data); });

  node.filter(d => d.data._collapsed && (d.data.children||[]).length)
    .append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('fill',d=>d._c).attr('font-size','8px').attr('font-weight','700')
    .attr('pointer-events','none')
    .text(d => d.data.children.length);

  node.each(function(d) {
    const el = d3.select(this);
    const lines = d.data.name.split('\n');
    const root0 = d.depth === 0;
    const [px] = rad(d.x, d.y);
    const anchor = root0 ? 'middle' : px >= 0 ? 'start' : 'end';
    const xOff   = root0 ? 0 : px >= 0 ? r(d)+8 : -(r(d)+8);
    const fs = d.depth===0?14 : d.depth===1?11.5 : d.depth===2?10 : 9;
    const fw = d.depth<=1?'700' : d.depth===2?'500' : '400';
    const lh = fs*1.3, totalH = (lines.length-1)*lh;
    lines.forEach((line,i) => {
      el.append('text')
        .attr('x', xOff)
        .attr('dy', root0 ? r(d)+17+i*lh : -totalH/2+i*lh)
        .attr('text-anchor', anchor)
        .attr('dominant-baseline', root0?'auto':'central')
        .attr('fill', d._c)
        .attr('fill-opacity', d.depth===0?1:d.depth===1?0.95:0.78)
        .attr('font-size', fs+'px').attr('font-weight', fw)
        .attr('pointer-events','none')
        .text(line);
    });
  });
}

// ── Toggle ──────────────────────────────────────────────────────────────────
function toggle(d) {
  if (!(d.children||[]).length) return;
  d._collapsed = !d._collapsed;
  render();
}
function expandAll()  { walk(DATA, d => { d._collapsed=false; }); render(); }
function collapseAll(){ walk(DATA, d => { if(d.id!==1 && (d.children||[]).length) d._collapsed=true; }); render(); }

// ── Editor ──────────────────────────────────────────────────────────────────
let sel = null;
const edEl  = document.getElementById('ed');
const einp  = document.getElementById('einp');
function openEd(e,d) {
  sel = d;
  einp.value = d.name;
  document.getElementById('elbl').textContent = d.id===1?'Edit Root':'Edit Node';
  document.getElementById('bdel').style.display = d.id===1?'none':'';
  edEl.style.left = Math.min(e.clientX+12, W-250)+'px';
  edEl.style.top  = Math.min(e.clientY+12, H-180)+'px';
  edEl.style.display='block'; einp.focus(); einp.select();
}
function closeEditor(){ edEl.style.display='none'; sel=null; }
function saveEdit(){ if(!sel)return; const v=einp.value.trim(); if(v)sel.name=v; closeEditor(); render(); }
function addChild(){
  if(!sel)return;
  if(!sel.children)sel.children=[];
  sel._collapsed=false;
  sel.children.push({id:Date.now(),name:'New Node',_ck:sel._ck});
  propagate(DATA,'root'); closeEditor(); render();
}
function deleteNode(){
  if(!sel||sel.id===1)return;
  function rm(p){ if(!p.children)return false; const i=p.children.findIndex(c=>c.id===sel.id); if(i!==-1){p.children.splice(i,1);return true;} return p.children.some(rm); }
  rm(DATA); closeEditor(); render();
}
einp.addEventListener('keydown', e=>{ if(e.key==='Enter')saveEdit(); if(e.key==='Escape')closeEditor(); });
svg.on('click', closeEditor);

// ── Reset / Export ──────────────────────────────────────────────────────────
function resetView(){
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.65));
}
function exportSVG(){
  const a=document.createElement('a');
  a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent('<?xml version="1.0" standalone="no"?>\n'+new XMLSerializer().serializeToString(document.querySelector('svg')));
  a.download='prime-concierge-quiz-funnel.svg'; a.click();
}

// ── Init ────────────────────────────────────────────────────────────────────
// Collapse all except root — keeps it clean on load
walk(DATA, d => { if(d.id!==1 && (d.children||[]).length) d._collapsed=true; });

render();   // transform is already set — nodes appear in correct position immediately

window.addEventListener('resize', ()=>{
  svg.attr('width',window.innerWidth).attr('height',window.innerHeight);
});
</script>
