let nextId = 3000;

// ── Colour helpers ─────────────────────────────────────────────────────────────
function propagate(node, inheritKey) {
  if (!node._colorKey) node._colorKey = inheritKey || 'root';
  (node.children || []).forEach(c => propagate(c, node._colorKey));
}
propagate(treeData, 'root');

function nodeColor(d) { return keyToHex[d.data._colorKey] || '#a78bfa'; }

// ── SVG ────────────────────────────────────────────────────────────────────────
const svg = d3.select('body').append('svg')
  .attr('width', window.innerWidth)
  .attr('height', window.innerHeight);
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.03, 6])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom).on('dblclick.zoom', null);

// ── Layout ─────────────────────────────────────────────────────────────────────
const tree = d3.tree()
  .size([2 * Math.PI, 440])
  .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);

const radial = (x, y) => [(y = +y) * Math.cos(x -= Math.PI / 2), y * Math.sin(x)];
const linkGen = d3.linkRadial().angle(d => d.x).radius(d => d.y);

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  g.selectAll('*').remove();
  const root = d3.hierarchy(treeData, d => d._collapsed ? null : d.children);
  tree(root);
  root.each(d => { d._col = nodeColor(d); });

  // Links
  g.selectAll('.link')
    .data(root.links()).join('path')
    .attr('class','link')
    .attr('d', linkGen)
    .attr('stroke', d => d.target._col)
    .attr('stroke-width', d => Math.max(0.6, 2 - d.target.depth * 0.28))
    .attr('stroke-opacity', 0.25);

  // Node groups
  const node = g.selectAll('.node')
    .data(root.descendants()).join('g')
    .attr('class','node')
    .attr('transform', d => `translate(${radial(d.x, d.y)})`);

  const r = d => d.depth===0?34 : d.depth===1?20 : d.depth===2?12 : 7;

  // Glow
  node.append('circle')
    .attr('r', d => r(d)+9)
    .attr('fill', d => d._col)
    .attr('fill-opacity', 0.05)
    .attr('stroke','none');

  // Circle
  node.append('circle')
    .attr('r', r)
    .attr('fill', d => d._col)
    .attr('fill-opacity', d => d.depth===0?0.88:d.depth===1?0.17:0.09)
    .attr('stroke', d => d._col)
    .attr('stroke-width', d => d.depth===0?0:1.5)
    .attr('stroke-opacity', 0.55)
    .on('click', (e,d) => { e.stopPropagation(); toggle(d.data); })
    .on('dblclick', (e,d) => { e.stopPropagation(); openEditor(e,d.data); });

  // Collapsed badge
  node.filter(d => d.data._collapsed && (d.data.children||[]).length)
    .append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('fill', d=>d._col).attr('font-size','8px').attr('font-weight','700')
    .attr('pointer-events','none')
    .text(d => d.data.children.length);

  // Labels (multi-line support)
  node.each(function(d) {
    const el = d3.select(this);
    const lines = d.data.name.split('\n');
    const isRoot = d.depth===0;
    const [px] = radial(d.x, d.y);
    const anchor = isRoot?'middle': px>=0?'start':'end';
    const xOff   = isRoot?0: px>=0?r(d)+8:-(r(d)+8);
    const fs = d.depth===0?14:d.depth===1?11.5:d.depth===2?10:9;
    const fw = d.depth<=1?'700':d.depth===2?'500':'400';
    const lh = fs*1.3;
    const totalH = (lines.length-1)*lh;

    lines.forEach((line,i) => {
      const dy = isRoot ? r(d)+17+i*lh : -totalH/2+i*lh;
      el.append('text')
        .attr('x', xOff).attr('dy', dy)
        .attr('text-anchor', anchor)
        .attr('dominant-baseline', isRoot?'auto':'central')
        .attr('fill', d._col)
        .attr('fill-opacity', d.depth===0?1:d.depth===1?0.95:0.78)
        .attr('font-size', fs+'px').attr('font-weight', fw)
        .attr('pointer-events','none')
        .text(line);
    });
  });
}

// ── Toggle ─────────────────────────────────────────────────────────────────────
function toggle(data) {
  if (!(data.children||[]).length) return;
  data._collapsed = !data._collapsed;
  render();
}
function expandAll()  { walk(treeData, d=>{d._collapsed=false}); render(); }
function collapseAll(){ walk(treeData, d=>{if(d.id!==1&&(d.children||[]).length)d._collapsed=true}); render(); }
function walk(n,fn)   { fn(n); (n.children||[]).forEach(c=>walk(c,fn)); }

// ── Editor ─────────────────────────────────────────────────────────────────────
const editor   = document.getElementById('node-editor');
const editInput= document.getElementById('edit-input');

function openEditor(e,data){
  selectedNode=data;
  editInput.value=data.name;
  document.getElementById('edit-label').textContent=data.id===1?'Edit Root':'Edit Node';
  document.getElementById('btn-del').style.display=data.id===1?'none':'';
  const ex=Math.min(e.clientX+12,window.innerWidth-260);
  const ey=Math.min(e.clientY+12,window.innerHeight-180);
  editor.style.left=ex+'px'; editor.style.top=ey+'px';
  editor.style.display='block';
  editInput.focus(); editInput.select();
}
function closeEditor(){ editor.style.display='none'; selectedNode=null; }
function saveEdit(){
  if(!selectedNode)return;
  const v=editInput.value.trim();
  if(v)selectedNode.name=v;
  closeEditor(); render();
}
function addChild(){
  if(!selectedNode)return;
  if(!selectedNode.children)selectedNode.children=[];
  selectedNode._collapsed=false;
  selectedNode.children.push({id:nextId++, name:'New Node', _colorKey:selectedNode._colorKey});
  closeEditor(); render();
}
function deleteNode(){
  if(!selectedNode||selectedNode.id===1)return;
  function rm(p){
    if(!p.children)return false;
    const i=p.children.findIndex(c=>c.id===selectedNode.id);
    if(i!==-1){p.children.splice(i,1);return true;}
    return p.children.some(rm);
  }
  rm(treeData); closeEditor(); render();
}
editInput.addEventListener('keydown',e=>{
  if(e.key==='Enter')saveEdit();
  if(e.key==='Escape')closeEditor();
});
svg.on('click',closeEditor);

// ── Reset / Export ─────────────────────────────────────────────────────────────
function resetView(){
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity.translate(window.innerWidth/2,window.innerHeight/2).scale(0.58)
  );
}
function exportSVG(){
  const src='<?xml version="1.0" standalone="no"?>\n'+new XMLSerializer().serializeToString(document.querySelector('svg'));
  const a=document.createElement('a');
  a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(src);
  a.download='prime-concierge-quiz-funnel.svg';
  a.click();
}

// ── Init — start with depth-3+ collapsed ──────────────────────────────────────
walk(treeData, d=>{
  if(d.depth>=2&&(d.children||[]).length) d._collapsed=true;
});
render();
resetView();
window.addEventListener('resize',()=>{
  svg.attr('width',window.innerWidth).attr('height',window.innerHeight);
});
